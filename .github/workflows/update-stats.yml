name: Update Stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Fetch real stats
        run: python fetch_stats.py
        env:
          GH_PAT: ${{ secrets.GH_PAT }}

      - name: Commit updated stats
        run: |
          git config user.name "Mahmoud"
          git config user.email "7oda.mo7amed1599@gmail.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: update profile stats"
          git push
